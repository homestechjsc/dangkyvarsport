<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - VarSport Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2064ED;
            --primary-hover: #1649b8;
            --bg-body: #f8f9fc;
            --text-main: #2d3436;
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .logo-area { margin-bottom: 30px; }
        .logo-area h2 { 
            color: var(--primary); 
            margin: 0; 
            font-size: 28px; 
            letter-spacing: -1px;
        }
        .logo-area p { color: #888; font-size: 14px; margin-top: 5px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 14px; 
            font-weight: 600; 
            color: #555;
        }

        .login-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e1e4e8;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            transition: 0.3s;
            outline: none;
        }

        .login-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(32, 100, 237, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-login:disabled { background: #ccc; cursor: not-allowed; }

        #error-msg {
            color: #ff4d4f;
            background: #fff2f0;
            border: 1px solid #ffccc7;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .footer-text { margin-top: 25px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <h2>VAR SPORT</h2>
            <p>Hệ thống quản trị nội bộ</p>
        </div>

        <div id="error-msg"></div>

        <div class="form-group">
            <label>Tài khoản</label>
            <input type="text" id="username" class="login-input" placeholder="Nhập admin..." autocomplete="off">
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" class="login-input" placeholder="••••••••">
        </div>

        <button id="btn-login" class="btn-login">ĐĂNG NHẬP</button>

        <div class="footer-text">
            &copy; 2026 Homestech JSC. All rights reserved.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDLXIdiehtoCfRKH9qQYU2u5IoRDk7KmxM",
            authDomain: "quanlykhachhangvar.firebaseapp.com",
            databaseURL: "https://quanlykhachhangvar-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "quanlykhachhangvar",
            storageBucket: "quanlykhachhangvar.firebasestorage.app",
            messagingSenderId: "445137801788",
            appId: "1:445137801788:web:a5007ec21d3c8671eba939",
            measurementId: "G-WHYLW6WR6V"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const btn = document.getElementById('btn-login');
        const errorEl = document.getElementById('error-msg');

        btn.onclick = async () => {
            let email = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            if (!email || !pass) {
                showError("Vui lòng nhập đầy đủ thông tin");
                return;
            }

            // Tự động chuyển 'admin' thành email đã tạo trên Firebase
            if (email.toLowerCase() === "admin") {
                email = "admin@homestechjsc.vn";
            }

            btn.innerText = "Đang kiểm tra...";
            btn.disabled = true;
            errorEl.style.display = 'none';

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                // Thành công -> Chuyển sang trang quản trị
                window.location.href = 'admin.html';
            } catch (error) {
                console.error("Lỗi đăng nhập:", error.code);
                showError("Tài khoản hoặc mật khẩu không chính xác!");
                btn.innerText = "ĐĂNG NHẬP";
                btn.disabled = false;
            }
        };

        function showError(msg) {
            errorEl.innerText = msg;
            errorEl.style.display = 'block';
        }

        // Hỗ trợ nhấn phím Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btn.click();
        });
    </script>
</body>
</html>
