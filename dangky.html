                <form class="registration-form" id="registration-form">
                    <div class="form-group form-row">
                        <select id="input-sport" class="form-input form-select" required>
                            <option value="" disabled selected>Dịch vụ</option>
                            <option value="Pickleball">Pickleball</option>
                            <option value="Bida">Bida</option>
                        </select>
                        <input type="text" id="input-name" class="form-input" placeholder="Tên khách hàng" required>
                    </div>
                    <div class="form-group">
                        <input type="tel" id="input-phone" class="form-input" placeholder="Số điện thoại" oninput="this.value = this.value.replace(/[^0-9]/g, '');" pattern="^0[0-9]{9}$" maxlength="10" title="Vui lòng nhập đúng 10 số, bắt đầu bằng số 0" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="input-address" class="form-input" placeholder="Địa chỉ" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="input-scale" class="form-input" placeholder="Quy mô" required>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-submit">ĐĂNG KÝ NGAY</button>

            </div>
        </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLXIdiehtoCfRKH9qQYU2u5IoRDk7KmxM",
        authDomain: "quanlykhachhangvar.firebaseapp.com",
        databaseURL: "https://quanlykhachhangvar-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "quanlykhachhangvar",
        storageBucket: "quanlykhachhangvar.firebasestorage.app",
        messagingSenderId: "445137801788",
        appId: "1:445137801788:web:a5007ec21d3c8671eba939",
        measurementId: "G-WHYLW6WR6V"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const form = document.getElementById('registration-form');
    form.addEventListener('submit', function (e) {
        e.preventDefault();

        const sport = document.getElementById('input-sport').value;
        const name = document.getElementById('input-name').value;
        const phone = document.getElementById('input-phone').value;
        const address = document.getElementById('input-address').value;
        const scale = document.getElementById('input-scale').value;

        const registrationsRef = ref(database, 'registrations');
        const newRegistrationRef = push(registrationsRef);

        set(newRegistrationRef, {
            sport: sport,
            name: name,
            phone: phone,
            address: address,
            scale: scale,
            timestamp: new Date().toLocaleString('vi-VN')
        })
        .then(() => {
            // --- CẤU HÌNH GỬI TELEGRAM (ĐÃ FIX LỖI BIẾN) ---
            // --- ĐOẠN CODE TEST TRIỆT ĐỂ ---
const telegram_bot_token = '8438573433:AAG4nQYSpz9fDT3yB284LRQrFuNSNorkakM';
const telegram_chat_id = '-1003762358550'; // Đảm bảo không có dấu cách ở hai đầu

console.log("Đang gửi đến ID:", telegram_chat_id); // Dòng này để kiểm tra trong Console

const message = `🔔 Đăng Ký: CÓ KHÁCH MỚI!\n` +
                `👤 Tên: ${name}\n` +
                `📱 SĐT: ${phone}\n`+
                `🏡 ĐC: ${address}`;

fetch(`https://api.telegram.org/bot${telegram_bot_token}/sendMessage`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
        chat_id: telegram_chat_id,
        text: message
    })
})
.then(res => res.json())
.then(data => {
    if (data.ok) {
        console.log("✅ ĐÃ THÀNH CÔNG! Check Telegram đi Bảo!");
    } else {
        console.error("❌ Telegram từ chối vì:", data.description);
    }
})
.catch(err => console.error("❌ Lỗi mạng:", err));

            alert(`Cảm ơn "${name}" đã đăng ký thành công! Đội ngũ VARSport sẽ liên hệ sớm nhất.`);
            form.reset();
        })
        .catch((error) => {
            console.error("Lỗi Firebase:", error);
            alert("Gửi thông tin thất bại.");
        });
    });

    // Các hàm phụ trợ
    window.copyPhoneNumber = function(e, phoneNumber) {
        e.preventDefault();
        navigator.clipboard.writeText(phoneNumber).then(() => {
            const toast = document.getElementById('toast-message');
            toast.innerHTML = `Đã lưu SĐT ${phoneNumber} trong bộ nhớ`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        });
    };

    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 50) header.classList.add('scrolled');
        else header.classList.remove('scrolled');
    });

    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const navLinks = document.getElementById('navLinks');
    if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener('click', () => {
            navLinks.style.display = navLinks.style.display === 'flex' ? 'none' : 'flex';
            if (navLinks.style.display === 'flex') {
                navLinks.style.flexDirection = 'column';
                navLinks.style.position = 'absolute';
                navLinks.style.top = '100%';
                navLinks.style.left = '0';
                navLinks.style.right = '0';
                navLinks.style.background = 'rgba(10, 22, 40, 0.98)';
                navLinks.style.padding = '20px';
                navLinks.style.gap = '16px';
                navLinks.style.borderTop = '1px solid rgba(255,255,255,0.1)';
            }
        });
    }
</script>
